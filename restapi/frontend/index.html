<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Plantas 🌿</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="callrestapi.js"></script>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    padding: 20px;
}

.container {
    max-width: 800px;
    margin: auto;
}

input {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
}

button {
    padding: 10px;
    margin: 5px;
    cursor: pointer;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th {
    background: #4CAF50;
    color: white;
}

td, th {
    padding: 10px;
    border: 1px solid #ddd;
}
</style>
</head>

<body>

<div class="container">

<h1>🌿 Registro de Plantas</h1>

<input type="hidden" id="id">

<input type="text" id="nombre_comun" placeholder="Nombre común">
<input type="text" id="nombre_cientifico" placeholder="Nombre científico">
<input type="text" id="descripcion" placeholder="Descripción">

<button onclick="guardar()">Guardar</button>
<button onclick="getPlantas()">Mostrar</button>

<div id="resultado"></div>

</div>

</body>
</html>
